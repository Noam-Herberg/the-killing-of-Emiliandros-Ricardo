<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Requias Sector One-Shot - Character Dossier</title>
    <link rel="stylesheet" href="styles.css?v=20260515-npc-tooltips">
  </head>
  <body>
    <header class="site-header compact">
      <div>
        <p class="eyebrow">Sealed Character Dossier</p>
        <h1 id="detailName">Character Details</h1>
      </div>
      <a class="button secondary" href="selection.html">Back to Selection</a>
    </header>

    <main class="detail-layout" id="detailPage">
      <section class="detail-portrait" id="detailPortrait"></section>

      <section class="dossier">
        <div class="section-block">
          <p class="eyebrow">Public File</p>
          <h2>Public Background</h2>
          <div id="detailPublic" class="prose"></div>
        </div>

        <div class="section-block">
          <p class="eyebrow">Local Network</p>
          <h2>Key Contacts</h2>
          <div id="detailContacts" class="contact-list"></div>
        </div>

        <div class="section-block secret">
          <p class="eyebrow">Private Mission - Eyes Only</p>
          <div id="detailSecret" class="prose"></div>
        </div>

        <div class="section-block">
          <p class="eyebrow">Character Sheet</p>
          <div id="detailSheet" class="sheet-link"></div>
        </div>
      </section>
    </main>

    <script src="characters.js?v=20260515-npc-tooltips"></script>
  </body>
</html>
